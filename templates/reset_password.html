{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background-color: #fafafa;">
    <h2 style="text-align: center; color: #1a73e8; margin-bottom: 25px;">Set a New Password</h2>

    <p id="reset-message" style="color: #555; margin-bottom: 20px; display: none;"></p>

    <form id="reset-form" style="display: none;">
        <label for="password" style="font-weight: bold; display: block; margin-bottom: 5px;">New Password</label>
        <input type="password" name="password" id="password" required
               style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px;">

        <label for="confirm_password" style="font-weight: bold; display: block; margin-bottom: 5px;">Confirm New Password</label>
        <input type="password" name="confirm_password" id="confirm_password" required
               style="width: 100%; padding: 10px; margin-bottom: 25px; border: 1px solid #ccc; border-radius: 5px;">

        <button type="submit" style="width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 1em; cursor: pointer;">
            Reset Password
        </button>
    </form>

    <p id="reset-invalid" style="text-align: center; color: #555; display: none;">
        This link is invalid or has expired.
        <a href="{{ url_for('forgot_password') }}" style="color: #1a73e8; text-decoration: none;">Request a new one</a>.
    </p>
</div>

<script>
(function () {
    var SUPABASE_URL = {{ supabase_url|tojson }};
    var SUPABASE_ANON_KEY = {{ supabase_anon_key|tojson }};

    var form = document.getElementById('reset-form');
    var message = document.getElementById('reset-message');
    var invalid = document.getElementById('reset-invalid');

    function showMessage(text, isError) {
        message.textContent = text;
        message.style.color = isError ? '#d93025' : '#188038';
        message.style.display = 'block';
    }

    var params = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    var accessToken = params.get('access_token');

    if (!accessToken || params.get('type') !== 'recovery' || !SUPABASE_URL || !SUPABASE_ANON_KEY) {
        invalid.style.display = 'block';
        return;
    }

    form.style.display = 'block';

    form.addEventListener('submit', function (event) {
        event.preventDefault();
        var password = document.getElementById('password').value;
        var confirmPassword = document.getElementById('confirm_password').value;

        if (password.length < 6) {
            showMessage('Password must be at least 6 characters.', true);
            return;
        }
        if (password !== confirmPassword) {
            showMessage('Passwords do not match.', true);
            return;
        }

        fetch(SUPABASE_URL + '/auth/v1/user', {
            method: 'PUT',
            headers: {
                'Authorization': 'Bearer ' + accessToken,
                'apikey': SUPABASE_ANON_KEY,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ password: password })
        })
        .then(function (response) {
            return response.json().then(function (data) {
                return { ok: response.ok, data: data };
            });
        })
        .then(function (result) {
            if (result.ok) {
                form.style.display = 'none';
                showMessage('Your password has been reset. You can now log in.', false);
                setTimeout(function () {
                    window.location.href = "{{ url_for('login') }}";
                }, 2000);
            } else {
                showMessage(result.data.msg || result.data.error_description || 'Could not reset password.', true);
            }
        })
        .catch(function () {
            showMessage('Could not reach the auth service. Please try again.', true);
        });
    });
})();
</script>
{% endblock %}
