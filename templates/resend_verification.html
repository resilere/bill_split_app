{% extends "base.html" %}
{% block title %}Resend Confirmation{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background-color: #fafafa;">
    <h2 style="text-align: center; color: #1a73e8; margin-bottom: 25px;">Resend Confirmation Email</h2>

    <p style="color: #555; margin-bottom: 20px;">Enter your email address and we'll resend the confirmation link if your account isn't confirmed yet.</p>

    <form method="POST" action="{{ url_for('resend_verification') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="email" style="font-weight: bold; display: block; margin-bottom: 5px;">Email</label>
        <input type="email" name="email" id="email" required
               style="width: 100%; padding: 10px; margin-bottom: 25px; border: 1px solid #ccc; border-radius: 5px;">

        <button type="submit" style="width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 1em; cursor: pointer;">
            Resend Link
        </button>
    </form>

    <p style="text-align: center; margin-top: 20px; color: #555;">
        <a href="{{ url_for('login') }}" style="color: #1a73e8; text-decoration: none;">Back to login</a>
    </p>
</div>
{% endblock %}
